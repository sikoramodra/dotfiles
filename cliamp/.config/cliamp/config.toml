theme = ""
provider = "ytmusic"
visualizer = "None"
speed = 1.00

eq_preset = "Custom"
eq = [0, -1, -3, -2, 0, 1, 2, 3, 4, 2]

sample_rate = 96000
buffer_ms = 200
resample_quality = 4
bit_depth = 24

[ytmusic]
enabled = true
client_id = "$CLIAMP_YTMUSIC_CLIENT_ID"
client_secret = "$CLIAMP_YTMUSIC_CLIENT_SECRET"
cookies_from = "brave:~/.config/BraveSoftware/Brave-Origin-Beta"
