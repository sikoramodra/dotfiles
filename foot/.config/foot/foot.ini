[main]
include=~/.config/omarchy/current/theme/foot.ini
term=xterm-256color
shell=fish
font=Source Code Pro:size=9
pad=1x0 center
initial-window-mode=windowed
workers=0

[scrollback]
lines=10000

[cursor]
style=block
blink=no

[key-bindings]
clipboard-copy=Control+Shift+C Control+Insert
primary-paste=none
clipboard-paste=Control+Shift+V Shift+Insert
